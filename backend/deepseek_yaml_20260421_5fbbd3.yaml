version: '3.8'

services:
  # Backend API
  api:
    build: ./backend
    environment:
      - DB_HOST=db
      - DB_USER=alpha_user
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - db

  # Frontend (served by nginx)
  frontend:
    build: ./frontend
    ports:
      - "80:80"

  # MySQL Database
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=alpha_portal
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: